services:
  backend:
    build:
      context: ./K-line-back
    container_name: k-line-back
    restart: unless-stopped
    environment:
      KLINE_DATABASE_URL: ${KLINE_DATABASE_URL:-}
      KLINE_SYNC_CONCEPTS: ${KLINE_SYNC_CONCEPTS:-true}
      KLINE_PROVIDER: ${KLINE_PROVIDER:-}
      TZ: Asia/Shanghai
    volumes:
      - kline_data:/app/data
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./K-line-web
    container_name: k-line-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      TZ: Asia/Shanghai

volumes:
  kline_data:
